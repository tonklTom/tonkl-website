# ────────────────────────────────────────────────────────────────
# Nginx reverse proxy for Tonkl testnet
# ────────────────────────────────────────────────────────────────
# Place at: /etc/nginx/sites-available/tonkl
# Symlink:  ln -s /etc/nginx/sites-available/tonkl /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=faucet:10m rate=5r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name testnet.tonkl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name testnet.tonkl.com;

    # ── SSL (Let's Encrypt) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/testnet.tonkl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testnet.tonkl.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Request size limits ────────────────────────────────────
    client_max_body_size 16K;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ── API routes (rate limited) ──────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # ── Faucet route (stricter rate limit) ─────────────────────
    location /api/faucet {
        limit_req zone=faucet burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets + Next.js pages ──────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Block direct access to node RPC ────────────────────────
    # The Tonkl node listens on 127.0.0.1:9100 — nginx never
    # proxies to it directly. All node access goes through the
    # Next.js /api/node route which applies whitelisting + rate limits.

    # ── Deny hidden files ──────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
